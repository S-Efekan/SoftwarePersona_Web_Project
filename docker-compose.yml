services:
  mysql:
    image: mysql:8.0
    container_name: ctis256-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
      MYSQL_USER: std
      MYSQL_PASSWORD: std
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d

  # phpMyAdmin yerine DbGate
  db_admin:
    image: dbgate/dbgate
    container_name: ctis256-dbgate
    restart: always
    ports:
      - "8080:3000" # localhost/:8080
    environment:
      # CONNECTIONS: "mysql://std:std@mysql:3306/test"
      - DB_TYPE=mysql
    depends_on:
      - mysql

volumes:
  mysql_data: